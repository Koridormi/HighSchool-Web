<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../build/css/style.css">
    <!-- Scripts -->
    <script defer src="../src/js/app.js"></script>

<body>
    <header>
        <div class="headerDiv">
            <div class="headerDiv__logo">
                <a href="../index.html">
                    <img src="../public/img/logo.webp" alt="Logo del Colegio Solaris">
                </a>
            </div>

            <nav class="headerDiv__nav">
                <ul>
                    <li>
                        <a href="../index.html">Inicio</a>

                    <li>

                    <li class="headerDiv__nav--activo">
                        <a href="./contacto.html">Contacto</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="formularioMain">
        <h1>Ponte en Contacto con Nosotros</h1>

        <div class="formularioDiv contenedor">
            <form class="formulario" id="formulario">
                <div class="formularioContenido">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" autocomplete="given-name" required placeholder="Tu nombre">

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" autocomplete="family-name" required placeholder="Tu apellido">
                </div>

                <div class="formularioContenido">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required placeholder="Tu email">
                </div>

                <div class="formularioContenido">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>
            </form>
        </div>

        <div class="formularioButton">
            <button type="submit" form="formulario">Enviar</button>
        </div>
    </main>

    <footer>
        <div class="footerDiv">
            <div class="footerDiv__derechos">
                <p id="copyright-titulo">Colegio Solaris</p>
                <p>Todos los derechos reservados</p>
            </div>

            <div class="footerDiv__enlaces">
                <a href="https://www.facebook.com" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-facebook"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M7 10v4h3v7h4v-7h3l1 -4h-4v-2a1 1 0 0 1 1 -1h3v-4h-3a5 5 0 0 0 -5 5v2h-3" /></svg>
                </a>

                <a href="https://www.instagram.com" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-instagram"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 8a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4l0 -8" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /><path d="M16.5 7.5v.01" /></svg>
                </a>

                <a href="https://www.whatsapp.com" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-whatsapp"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 21l1.65 -3.8a9 9 0 1 1 3.4 2.9l-5.05 .9" /><path d="M9 10a.5 .5 0 0 0 1 0v-1a.5 .5 0 0 0 -1 0v1a5 5 0 0 0 5 5h1a.5 .5 0 0 0 0 -1h-1a.5 .5 0 0 0 0 1" /></svg>
                </a>
            </div>
        </div>
